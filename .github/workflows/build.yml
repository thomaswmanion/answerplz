# Fast CI on every push — same build steps as release, no upload.
# Local: ./scripts/docker-linux-build.sh (Docker) mirrors the Linux job.

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            build-essential \
            pkg-config \
            libdbus-1-dev \
            libxcb1-dev \
            libxcb-randr0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci
      - run: npm run tauri -- build

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: npm ci
      - run: npm run tauri -- build

  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Cargo build (macOS)
        run: cd src-tauri && cargo build --release -v 2>&1 | tee ../macos-cargo.log
      - name: Tauri bundle (macOS)
        run: npm run tauri -- build -v 2>&1 | tee macos-tauri-build.log
      - name: Upload macOS logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-log
          path: |
            macos-cargo.log
            macos-tauri-build.log
          if-no-files-found: ignore
