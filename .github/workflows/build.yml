# Fast CI on every push — same build steps as release, no upload.
# Local Linux: ./scripts/docker-linux-build.sh

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  VITE_APP_VERSION: ${{ github.ref_name }}

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            build-essential \
            pkg-config \
            libdbus-1-dev \
            libxcb1-dev \
            libxcb-randr0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci
      - run: npm run tauri -- build

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - run: npm ci
      - run: npm run tauri -- build

  macos-arm64:
    runs-on: macos-latest
    env:
      CI: true
      APPLE_SIGNING_IDENTITY: "-"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      # Do NOT use rust-cache on macOS — it caused intermittent compile failures.
      - run: npm ci
      - name: Build Tauri (macOS)
        shell: bash
        run: |
          set -o pipefail
          npm run tauri -- build 2>&1 | tee tauri-macos-build.log
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-log
          path: tauri-macos-build.log
