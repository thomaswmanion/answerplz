# Build installers on Linux, Windows, and macOS (Apple Silicon).
# Intel Mac (x86_64) cross-compile on ARM runners is unreliable — omitted for now.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-22.04
            args: ""
            rust_targets: ""
            artifact: linux-x64
            bundles: appimage,deb,rpm
          - name: windows
            runner: windows-latest
            args: ""
            rust_targets: ""
            artifact: windows-x64
            bundles: msi,nsis
          - name: macos-arm64
            runner: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            artifact: macos-aarch64
            bundles: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            build-essential \
            pkg-config \
            libdbus-1-dev \
            libxcb1-dev \
            libxcb-randr0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        if: matrix.runner != 'macos-latest'
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.artifact }}

      - run: npm ci

      - name: Build Tauri bundles
        shell: bash
        env:
          CI: true
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          set -o pipefail
          build_args=(build ${{ matrix.args }})
          if [[ -n "${{ matrix.bundles }}" ]]; then
            build_args+=(--bundles "${{ matrix.bundles }}")
          fi
          npm run tauri -- "${build_args[@]}" 2>&1 | tee tauri-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-log
          path: tauri-build.log
          if-no-files-found: ignore

      - name: Collect installers
        shell: bash
        run: bash scripts/collect-installers.sh


      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-installers/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=v$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: bundles
          merge-multiple: true

      - name: Flatten release assets
        run: |
          mkdir -p release-installers
          find bundles -type f \( \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' -o \
            -name '*-setup.exe' -o \
            -name '*.app.zip' \
          \) -exec cp -n {} release-installers/ \;
          ls -la release-installers/
          count=$(ls -1 release-installers | wc -l)
          if [ "$count" -lt 3 ]; then
            echo "::error::Expected installers from linux, windows, and macOS (got $count files)"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: answerplz ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: release-installers/*
          overwrite_files: true
          fail_on_unmatched_files: true
